on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  deploy:
    if: contains(github.event.pull_request.labels.*.name, 'deploy')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: docker run --rm -v $(pwd):/site ghcr.io/ravindk89/braised:latest build --config braised-staging.yaml

      - name: Deploy
        uses: burnett01/rsync-deployments@v8
        with:
          switches: --mkpath -rv --delete
          path: ./dist/
          remote_path: ${{ secrets.DEPLOY_PATH }}/${{ github.head_ref }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT }}
          remote_user: deploy-staging
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Staged at https://staging.ravindkumar.com/site/${{ github.head_ref }}/`
            })

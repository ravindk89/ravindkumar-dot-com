on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  deploy:
    if: contains(github.event.pull_request.labels.*.name, 'deploy')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        env:
          BRAISED_BRANCH: ${{ github.head_ref }}
        run: docker run --rm -e BRAISED_BRANCH -v $(pwd):/site ghcr.io/ravindk89/braised:latest build --config braised-staging.yaml

      - name: Deploy
        uses: burnett01/rsync-deployments@v8
        with:
          switches: --mkpath -rv --delete
          path: ./dist/
          remote_path: ${{ secrets.DEPLOY_PATH }}/${{ github.head_ref }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT }}
          remote_user: deploy-staging
          remote_key: ${{ secrets.DEPLOY_KEY }}
          remote_key_pass: ${{ secrets.DEPLOY_KEY_PASS }}

      - name: Append staging URL to PR description
        uses: actions/github-script@v7
        with:
          script: |
            const stagingUrl = `https://staging.ravindkumar.com/staging/${{ github.head_ref }}/`;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const body = pr.data.body || '';
            if (body.includes(stagingUrl)) return;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body + `\n\n---\n**Staged:** ${stagingUrl}`
            });

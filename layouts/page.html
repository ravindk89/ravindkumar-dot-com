<!DOCTYPE html>
<html lang="en" data-theme="">
{{template "head" .}}
<body>

{{template "topnav" .}}

<!-- ═══════════════════════ PAGE SHELL -->
<div class="nav-overlay" id="navOverlay"></div>

<div class="page-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    {{if .Nav}}
    <ul>{{template "navTree" .Nav.Roots}}</ul>
    {{end}}
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <article class="page-body">
      {{if .Page.Title}}<h1 class="page-title">{{.Page.Title}}</h1>{{end}}
      <div class="page-prose">
        {{.Page.Content}}
      </div>
    </article>

    {{template "footer" .}}

  </div>
</div>

{{template "page-scripts" .}}

</body>
</html>

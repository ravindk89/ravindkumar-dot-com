{{define "page-scripts"}}
<script>
  (function () {
    var root  = document.documentElement;
    var btn   = document.getElementById('themeBtn');
    var label = document.getElementById('themeBtnLabel');
    var menu  = document.getElementById('themeMenu');
    var opts  = menu.querySelectorAll('.theme-opt');

    // ── Theme switcher ──────────────────────────────────────────────────────
    function setTheme(key) {
      root.setAttribute('data-theme', key);
      label.textContent = key.charAt(0).toUpperCase() + key.slice(1);
      opts.forEach(function(o) { o.classList.toggle('active', o.dataset.theme === key); });
      btn.setAttribute('aria-expanded', 'false');
      menu.classList.remove('open');
      try { localStorage.setItem('braised-theme', key); } catch(e) {}
    }

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var open = menu.classList.toggle('open');
      btn.setAttribute('aria-expanded', String(open));
    });
    opts.forEach(function(opt) {
      opt.addEventListener('click', function() { setTheme(opt.dataset.theme); });
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('#themeSwitcher')) {
        menu.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });

    var current = root.getAttribute('data-theme') || 'light';
    label.textContent = current.charAt(0).toUpperCase() + current.slice(1);
    opts.forEach(function(o) { o.classList.toggle('active', o.dataset.theme === current); });

    // ── Sidebar hamburger ───────────────────────────────────────────────────
    var navToggle = document.getElementById('navToggle');
    var sidebar   = document.getElementById('sidebar');
    var overlay   = document.getElementById('navOverlay');

    if (navToggle) {
      navToggle.addEventListener('click', function() {
        var open = sidebar.classList.toggle('is-open');
        overlay.classList.toggle('is-visible', open);
        navToggle.setAttribute('aria-expanded', String(open));
      });
      overlay.addEventListener('click', function() {
        sidebar.classList.remove('is-open');
        overlay.classList.remove('is-visible');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    }

    // ── Collapsible nav groups ──────────────────────────────────────────────
    document.querySelectorAll('.sb-group-toggle').forEach(function(toggle) {
      toggle.addEventListener('click', function() {
        var expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
      });
    });

    // ── Topnav dropdowns (click + keyboard) ────────────────────────────────
    document.querySelectorAll('.topnav-links > li').forEach(function(li) {
      var trigger  = li.querySelector(':scope > button');
      var dropdown = li.querySelector(':scope > .dropdown');
      if (!trigger || !dropdown) return;

      function openMenu() {
        dropdown.classList.add('open');
        trigger.setAttribute('aria-expanded', 'true');
      }
      function closeMenu() {
        dropdown.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      }

      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.contains('open') ? closeMenu() : openMenu();
      });

      trigger.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          if (dropdown.classList.contains('open')) {
            closeMenu();
          } else {
            openMenu();
            dropdown.querySelector('.dropdown-item').focus();
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          openMenu();
          dropdown.querySelector('.dropdown-item').focus();
        } else if (e.key === 'Escape') {
          closeMenu();
        }
      });

      dropdown.addEventListener('keydown', function(e) {
        var items = Array.from(dropdown.querySelectorAll('.dropdown-item'));
        var idx   = items.indexOf(document.activeElement);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          items[(idx + 1) % items.length].focus();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (idx <= 0) { closeMenu(); trigger.focus(); }
          else items[idx - 1].focus();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          closeMenu();
          trigger.focus();
        }
      });

      // Close on outside click or when focus leaves the menu entirely
      document.addEventListener('click', function(e) {
        if (!li.contains(e.target)) closeMenu();
      });
      li.addEventListener('focusout', function(e) {
        if (!li.contains(e.relatedTarget)) closeMenu();
      });
    });
  })();
</script>
{{end}}

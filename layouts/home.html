<!DOCTYPE html>
<html lang="en" data-theme="">
{{template "head" .}}
<body>

{{template "topnav" .}}

<!-- ═══════════════════════ PAGE SHELL -->
<div class="nav-overlay" id="navOverlay"></div>

<div class="page-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    {{if .Nav}}
    <ul>{{template "navTree" .Nav.Roots}}</ul>
    {{end}}
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <section class="hero-zone">
      <div class="hero-intro">
        <p class="hero-eyebrow">{{index .Site.Meta "hero_eyebrow"}}</p>
        {{.Page.Content}}
      </div>
    </section>

    {{template "footer" .}}

  </div>
</div>

{{template "page-scripts" .}}

</body>
</html>
